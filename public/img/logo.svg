<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="wt-grad" x1="0" y1="24" x2="24" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <!-- Shield/rounded square background -->
  <rect x="1" y="1" width="22" height="22" rx="6" fill="url(#wt-grad)"/>
  <!-- Stylized W shape made of growth lines -->
  <polyline points="4.5,16 8,9 12,14 16,7 19.5,4" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow tip on the growth line -->
  <polyline points="16.5,4 19.5,4 19.5,7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Bottom baseline -->
  <line x1="4.5" y1="19.5" x2="19.5" y2="19.5" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
</svg>